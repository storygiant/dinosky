<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
    <title>Dino the Dino</title>
    <script type="importmap">
      {
        "imports": {
          "three": "./three/three.module-min.js"
        }
      }
    </script>
    <script src="https://game-cdn.poki.com/scripts/v2/poki-sdk.js"></script>    
    <style>
	@font-face {
		font-family: "Orbitron";
		src: url("./fonts/orbitron-latin-400-normal.woff2?P2zh") format("woff2");
		font-weight: 400;
	}

	@font-face {
		font-family: "Orbitron";
		src: url("./fonts/orbitron-latin-700-normal.woff2?bZ01") format("woff2");
		font-weight: 700;
	}    	
	
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #343230;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: none;
    }

    canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
    }
    </style>
  </head>
  <body>
    <script>
      document.addEventListener('gesturestart', function(e) { e.preventDefault(); }, { passive: false });
      document.addEventListener('gesturechange', function(e) { e.preventDefault(); }, { passive: false });
    </script>
    <script src="matter/matter.min.js" type="text/javascript"></script>
    <script type="module" src="main.js"></script>
  </body>
</html>
